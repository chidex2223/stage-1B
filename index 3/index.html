<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile Card</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  padding:20px;
  width:90%;
  max-width:700px;
  border-radius:10px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

img{
  width:150px;
  height:150px;
  border-radius:50%;
}

.content{
  flex:1;
  min-width:250px;
}

h2{
  margin:0;
}

section{
  margin-top:10px;
}

ul{
  margin:5px 0;
}

a{
  margin-right:10px;
}

a:focus{
  outline:2px solid black;
}
</style>
</head>

<body>

<article class="card" data-testid="test-profile-card">

  <figure>
    <img data-testid="test-user-avatar"
      src="https://i.pravatar.cc/150?img=5"
      alt="User avatar"
    />
  </figure>

  <div class="content">

    <h2 data-testid="test-user-name">Chidera Nwafornso</h2>

    <p data-testid="test-user-bio">
      Frontend developer passionate about building clean and responsive web apps.
    </p>

    <p>Current Time (ms): 
      <span id="time" data-testid="test-user-time"></span>
    </p>

    <div data-testid="test-user-social-links">
      <a data-testid="test-user-social-twitter" href="https://twitter.com" target="_blank">Twitter</a>
      <a data-testid="test-user-social-github" href="https://github.com" target="_blank">GitHub</a>
    </div>

    <section data-testid="test-user-hobbies">
      <h3>Hobbies</h3>
      <ul>
        <li>Coding</li>
        <li>Music</li>
      </ul>
    </section>

    <section data-testid="test-user-dislikes">
      <h3>Dislikes</h3>
      <ul>
        <li>Buggy UI</li>
        <li>Slow apps</li>
      </ul>
    </section>

  </div>

</article>

<script>
function updateTime(){
  document.getElementById("time").textContent = Date.now();
}
updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
